<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGUI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --border-color: #333;
            --text-primary: #fff;
            --text-secondary: #a0a0a0;
            --accent-color: #10a37f;
            --accent-hover: #1ed185;
            --user-msg-bg: #3b82f6;
            --assistant-msg-bg: #2d2d2d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
        }

        .status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .message .role {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .message.thinking {
            opacity: 0.6;
        }

        .message.thinking .content::before {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .tool-call {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 8px;
            border-left: 3px solid var(--accent-color);
        }

        .tool-result {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 4px;
            font-family: monospace;
            color: var(--text-secondary);
        }

        .input-container {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--accent-color);
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-screen h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
        }

        .empty-state {
            display: none;
        }

        .chat-container.has-messages .empty-state {
            display: none;
        }

        .chat-container:not(.has-messages) .welcome-screen {
            display: flex;
        }

        .chat-container.has-messages .welcome-screen {
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>AGUI Chat</h1>
        <div class="status">
            <span class="status-dot"></span>
            Ready
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="welcome-screen">
            <h2>How can I help you today?</h2>
            <p>Try asking me to calculate some mathematical expressions, like "What is 123 * 456?"</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea 
                class="message-input" 
                id="messageInput" 
                placeholder="Type your message..."
                rows="1"
            ></textarea>
            <button class="send-button" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        let isProcessing = false;

        // Generate or retrieve session ID for conversation memory
        let sessionId = localStorage.getItem('agui-session-id');
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem('agui-session-id', sessionId);
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        function adjustTextareaHeight() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        }

        messageInput.addEventListener('input', adjustTextareaHeight);

        async function sendMessage() {
            if (isProcessing) return;

            const message = messageInput.value.trim();
            if (!message) return;

            isProcessing = true;
            sendButton.disabled = true;
            messageInput.value = '';
            adjustTextareaHeight();

            chatContainer.classList.add('has-messages');

            addMessage('user', message);

            const assistantMessage = addMessage('assistant', '');
            const contentElement = assistantMessage.querySelector('.content');
            contentElement.classList.add('thinking');
            contentElement.textContent = 'Thinking...';

            try {
                const response = await fetch('/agent/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: sessionId
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }

                if (!response.body) {
                    throw new Error('No response body');
                }

                // Use fetch with ReadableStream to handle SSE
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (!data) continue;

                            try {
                                const event = JSON.parse(data);
                                handleServerEvent(event, contentElement, assistantMessage);
                            } catch (e) {
                                // Try to parse as plain text
                                if (data) {
                                    fullText += data;
                                    contentElement.classList.remove('thinking');
                                    contentElement.textContent = fullText;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            }
                        }
                    }
                }

                // Process remaining buffer
                if (buffer.startsWith('data: ')) {
                    const data = buffer.slice(6).trim();
                    if (data) {
                        try {
                            const event = JSON.parse(data);
                            handleServerEvent(event, contentElement, assistantMessage);
                        } catch (e) {
                            // ignore
                        }
                    }
                }

            } catch (error) {
                contentElement.classList.remove('thinking');
                contentElement.textContent = `Error: ${error.message}`;
            }

            isProcessing = false;
            sendButton.disabled = false;
            messageInput.focus();
        }

        function handleServerEvent(event, contentElement, assistantMessage) {
            const eventType = event.event || event.type;

            switch (eventType) {
                case 'text':
                case 'textMessageContent':
                    // Handle text delta
                    const delta = event.delta || event.text || '';
                    if (delta) {
                        contentElement.classList.remove('thinking');
                        contentElement.textContent = delta;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                    break;

                case 'toolCall':
                case 'toolCallStart':
                    // Handle tool call start
                    const toolName = event.toolCallName || event.toolName || 'tool';
                    const toolCallDiv = document.createElement('div');
                    toolCallDiv.className = 'tool-call';
                    toolCallDiv.textContent = `Calling tool: ${toolName}`;
                    assistantMessage.appendChild(toolCallDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    break;

                case 'toolResult':
                case 'toolCallResult':
                    // Handle tool result
                    const resultContent = event.content || event.output || JSON.stringify(event.result || '');
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'tool-result';
                    resultDiv.textContent = `Result: ${resultContent}`;
                    assistantMessage.appendChild(resultDiv);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    break;

                case 'finished':
                case 'runFinished':
                    contentElement.classList.remove('thinking');
                    break;

                case 'error':
                case 'runError':
                    contentElement.classList.remove('thinking');
                    const errorMsg = event.error || 'Unknown error';
                    contentElement.textContent = `Error: ${errorMsg}`;
                    break;

                default:
                    // Try to extract text from any event
                    if (event.delta) {
                        contentElement.classList.remove('thinking');
                        contentElement.textContent = event.delta;
                    } else if (event.content) {
                        contentElement.classList.remove('thinking');
                        contentElement.textContent = event.content;
                    }
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const roleDiv = document.createElement('div');
            roleDiv.className = 'role';
            roleDiv.textContent = role === 'user' ? 'You' : 'Assistant';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = content;

            messageDiv.appendChild(roleDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }

        messageInput.focus();
    </script>
</body>
</html>
